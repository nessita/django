name: Tests All

on:
  pull_request:

permissions:
  contents: read

jobs:
  matrix_prep:
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      python_versions_output: ${{ steps.set-matrix.outputs.python_versions }}
    steps:
      - id: set-matrix
        run: echo "python_versions=3.8,3.9" >> "$GITHUB_OUTPUT"
  build-n-test:
    runs-on: ubuntu-latest
    needs: matrix_prep
    steps:
      - run: echo "${{needs.matrix_prep.outputs.python_versions_output}}"

name: Tests All

on:
  pull_request:

permissions:
  contents: read

jobs:
  matrix_prep:
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      python_versions_output: ${{ steps.set-matrix.outputs.python_versions }}
    steps:
      - id: set-matrix
        run: |
          python_versions=$(for i in `sed -e 's/^[ \t]*//' setup.cfg | grep -E 'Programming Language :: Python :: [0-9]+\.[0-9]+' | cut -d' ' -f6 | sort -u -V`; do echo -n "\"$i\", "; done; echo \"3.12\")
          echo "Supported Python versions: $python_versions"
          echo "python_versions=$python_versions" >> "$GITHUB_OUTPUT"
  build-n-test:
    runs-on: ubuntu-latest
    needs: matrix_prep
    steps:
      - run: echo "${{needs.matrix_prep.outputs.python_versions_output}}"
